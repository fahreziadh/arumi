    <div id="app"></div>
    <!-- Boot splash: overlays the app until the router commits its first
         real render (removed in src/routes/__root.tsx). -->

      id="splash"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        pointer-events: none;
        transition: opacity 250ms ease;
      "
    >

        #splash svg {
          width: 80px;
          height: 80px;

            width: 112px;
